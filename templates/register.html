<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Register - Swap Spot</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <style>
        body { padding-top: 60px; background: #f8f9fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .register-card { max-width: 400px; width: 100%; }
    </style>
</head>
<body>
<div class="register-card">
    <div class="card">
        <div class="card-body">
            <h3 class="card-title text-center mb-4">Create Account</h3>
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="alert alert-danger">
                  {% for msg in messages %}{{ msg }}<br>{% endfor %}
                </div>
              {% endif %}
            {% endwith %}
            <form action="{{ url_for('register') }}" method="post">
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" class="form-control" placeholder="5511999999999" required>
                </div>
                <button type="submit" class="btn btn-success btn-block">Register</button>
            </form>
            <hr>
            <p class="text-center">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
        </div>
    </div>
</div>
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
